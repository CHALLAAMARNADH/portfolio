<!-- src/app/components/projects/projects.component.html -->
<section id="projects" class="projects-section">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">// projects</span>
      <h2 class="section-title">Things I've Built</h2>
      <p class="section-desc">From NLP pipelines to Spring Boot REST APIs</p>
    </div>

    <div class="filter-bar">
      <button
        *ngFor="let f of filters"
        class="filter-btn"
        [class.active]="activeFilter === f.id"
        (click)="setFilter(f.id)">
        {{ f.label }}
      </button>
    </div>

    <div class="projects-grid">
      <div class="project-card" *ngFor="let project of filteredProjects; let i = index"
           [class.featured]="project.featured"
           [style.animation-delay]="i * 80 + 'ms'">

        <div class="card-top">
          <div class="card-folder">
            <svg width="36" height="32" viewBox="0 0 36 32" fill="none">
              <path d="M2 6C2 4.34 3.34 3 5 3H14L17 6H31C32.66 6 34 7.34 34 9V27C34 28.66 32.66 30 31 30H5C3.34 30 2 28.66 2 27V6Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
          </div>
          <div class="card-links">
            <a [href]="project.githubUrl" target="_blank" class="icon-link" title="GitHub">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49.99.1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0112 5.8c1.02.01 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
            </a>
            <a *ngIf="project.liveUrl" [href]="project.liveUrl" target="_blank" class="icon-link" title="Live Demo">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
              </svg>
            </a>
          </div>
        </div>

        <h3 class="project-title">{{ project.title }}</h3>
        <p class="project-desc">{{ project.description }}</p>

        <div class="project-footer">
          <div class="tech-stack">
            <span class="tech-tag" *ngFor="let tech of project.tech.slice(0, 4)">{{ tech }}</span>
          </div>
          <span class="category-badge"
                [style.color]="getCategoryColor(project.category)"
                [style.border-color]="getCategoryColor(project.category) + '33'">
            {{ getCategoryLabel(project.category) }}
          </span>
        </div>
      </div>
    </div>

    <div class="show-more" *ngIf="totalFiltered > 4 && !showAll">
      <button class="btn-show-more" (click)="showAll = true">
        Show {{ totalFiltered - 4 }} more projects
      </button>
    </div>
  </div>
</section>
